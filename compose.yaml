services:
  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mydatabase
      - SPRING_DATASOURCE_USERNAME=myuser
      - SPRING_DATASOURCE_PASSWORD=secret
      - PKCS11_PROXY_SOCKET=tcp://softhsm:2345
    depends_on:
      - postgres
      - softhsm

  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
    ##THIS IS TO SAVE DATA EVEN AFTER WE DELETE OUR DOCKER CONTAINERS
    volumes:
      - postgres-data:/var/lib/postgresql/data

  softhsm:
    image: 'vegardit/softhsm2-pkcs11-proxy:latest'
    environment:
      - TOKEN_AUTO_CREATE=1
      - TOKEN_LABEL=ColdWalletToken
      - TOKEN_USER_PIN=1234
      - TOKEN_SO_PIN=123456
      - TOKEN_IMPORT_TEST_DATA=0
      - PKCS11_DAEMON_SOCKET=tcp://0.0.0.0:2345

    ##THIS IS TO SAVE DATA EVEN AFTER WE DELETE OUR DOCKER CONTAINERS
    volumes:
      - softhsm-tokens:/var/lib/softhsm/tokens

volumes:
  softhsm-tokens:
  postgres-data:
